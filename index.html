<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI知识训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:30px}
.header h1{font-size:28px;margin-bottom:10px}
.info{font-size:14px;opacity:0.9}
.stats{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:14px}
.stats span{background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:12px}
.question{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.question-title{font-size:16px;font-weight:600;color:#333;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;padding:12px;background:#f5f5f5;border-radius:10px;cursor:pointer;border:2px solid transparent}
.option:hover{background:#eee}
.option.selected{background:#e8f4ff;border-color:#667eea}
.option.correct{background:#d4edda;border-color:#28a745}
.option.wrong{background:#f8d7da;border-color:#dc3545}
.option-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#667eea;color:white;border-radius:50%;font-weight:600;margin-right:12px}
.option-text{flex:1;word-break:break-word}
.submit-btn{width:100%;padding:16px;background:#667eea;color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:20px}
.result{background:white;border-radius:16px;padding:30px;text-align:center;margin-top:20px}
.score{font-size:48px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.exp{background:#f8f9fa;border-radius:12px;padding:16px;margin-top:12px;font-size:14px;color:#555;line-height:1.8;border-left:4px solid #667eea}
.exp-title{font-weight:600;color:#333;margin-bottom:10px;font-size:15px}
.date{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:8px 20px;border-radius:20px;font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🧠 每日AI知识训练</h1>
<div class="info" id="info">题库:200+题</div>
<div class="stats">
<span>✅ 正确: <b id="correctCount">0</b></span>
<span>❌ 错误: <b id="wrongCount">0</b></span>
<span>📚 进度: <b id="progress">0/200</b></span>
</div>
</div>
<div id="quiz"></div>
<button class="submit-btn" onclick="submitQuiz()">提交答案</button>
<div class="result" id="result" style="display:none"><div class="score" id="score">0/5</div></div>
</div>
<div class="date" id="date"></div>
<script>
var Q=[
{q:"LLM的核心原理是什么？",o:["逐字预测token","图像识别","语音合成"],a:0,e:"LLM（大型语言模型）的核心原理是通过海量文本数据训练，学习预测下一个词的概率。训练时，模型会根据前面的文字来预测下一个最可能出现的词，通过不断调整参数来提高预测准确率。"},
{q:"什么是Prompt Engineering？",o:["写代码","优化AI对话指令","设计UI"],a:1,e:"提示词工程是指通过精心设计输入给AI的指令，来获得更好的输出结果。好比问问题的方式不同，得到的答案也不同。好的提示词包括：明确任务目标、提供背景信息、指定输出格式、使用few-shot示例等。"},
{q:"Cursor这款AI编程工具的核心能力是什么？",o:["直接写完整个项目","自然语言生成代码","代替敲键盘"],a:1,e:"Cursor是一款AI编程助手，核心能力是理解自然语言并生成代码。你可以像说话一样描述你想要的功能，它就能帮你写出代码。"},
{q:"什么是vibe coding？",o:["用代码写音乐","AI辅助下看感觉写代码","可视化编程"],a:1,e:"vibe coding是2024年兴起的新概念，指在AI时代，开发者不再逐行敲代码，而是通过描述意图、让AI生成代码，自己更像是一个审美把关者。"},
{q:"AI的上下文窗口指的是什么？",o:["AI能记住多少对话历史","电脑内存大小","代码行数限制"],a:0,e:"上下文窗口是指AI一次对话中能处理的最大token数量（通常几千到几十万不等），决定了AI能记住多少内容。超过这个限制，早期的内容就会被遗忘。"},
{q:"RAG技术是什么的缩写？",o:["生成对抗网络","检索增强生成","自动回归模型"],a:1,e:"RAG = Retrieval-Augmented Generation（检索增强生成）。它的原理是：当用户提问时，先从知识库中检索相关资料，然后把检索到的资料连同问题一起送给LLM，让AI基于真实资料生成答案。"},
{q:"什么是AI幻觉？",o:["AI太困了","AI自信满满地编造错误信息","网络断开"],a:1,e:"AI幻觉指的是AI生成看似合理但实际上是错误或不存在的信息。因为LLM本质上是文字预测器，它只是在预测下一个最可能的词。"},
{q:"什么是AI Agent？",o:["只能聊天的机器人","能自主规划、执行任务的AI系统","编程语言"],a:1,e:"AI Agent是能自主完成任务的AI系统。Agent具备：目标理解能力、任务分解能力、工具使用能力、反思能力。它是AI从回答问题到解决问题的跨越。"},
{q:"Token在AI中是什么单位？",o:["加密货币代币","LLM处理文本的最小基本单位","编程语言"],a:1,e:"Token是LLM处理文本的基本单位。英文大约4个字符算1个Token，中文1-2个字符算1个Token。API调用是按Token计费的。"},
{q:"什么是Few-shot Learning？",o:["只学几次就能掌握","需要大量数据训练","快速学习算法"],a:0,e:"Few-shot Learning是指只给AI看1-3个例子，它就能理解任务并正确执行。比如想让AI分类评论情感，只需给它3个例子就能理解。"},
{q:"LoRA微调技术的主要优势是什么？",o:["训练速度快","用少量显存微调大模型","生成图片"],a:1,e:"LoRA是一种高效的大模型微调技术。优势在于：只用很少的显存就能对大模型进行微调，训练文件也很小。"},
{q:"temperature参数控制AI的什么特性？",o:["计算速度","回答的随机性","模型大小"],a:1,e:"Temperature控制AI输出的随机性。值为0时，AI总是选择最可能的答案；值越高，AI越可能选择不确定的答案，输出更有创意。"},
{q:"Embedding是什么意思？",o:["AI生成的插画","把文字转换成向量","图片处理技术"],a:1,e:"Embedding是把文字转换成数字向量的技术。本质上是把人类能理解的\"语言\"翻译成AI能理解的\"数字\"。"},
{q:"GitHub Copilot的原理是什么？",o:["自己写完整代码","预测并补全代码","翻译代码"],a:1,e:"Copilot是一个AI代码补全工具，原理是在你写代码时，预测你接下来可能要写的内容并自动补全。"},
{q:"MCP协议是什么？",o:["一种AI模型","让AI和其他工具连接的标准","编译器"],a:1,e:"MCP = Model Context Protocol，是让AI能和各种外部工具连接的标准协议。就像USB接口让电脑能连接各种外设一样。"},
{q:"System Prompt是什么？",o:["操作系统","给AI设定身份和规则的隐藏指令","用户输入"],a:1,e:"System Prompt是给AI设定身份和行为规则的隐藏指令。比如设置\"你是一个专业的数学老师\"、\"回答要简洁\"等。"},
{q:"Function Calling是什么？",o:["打电话","让AI能调用外部工具","写函数"],a:1,e:"Function Calling让AI不只是说话，还能做事。通过这个能力，AI可以调用外部工具比如查询天气、发送邮件等。"},
{q:"Stable Diffusion用哪种模型？",o:["Transformer","扩散模型","GAN"],a:1,e:"Stable Diffusion使用的是扩散模型。它的生成原理是：从一张纯噪声图片开始，逐步去除噪声并逐渐显现出清晰的图像。"},
{q:"ControlNet在AI绘画中做什么？",o:["控制网络连接","精确控制生成图片的姿势、边缘、线条","游戏引擎"],a:1,e:"ControlNet能提取参考图的结构信息（人物姿势、边缘线条、深度图等），然后让AI在生成新图时遵循这些结构。"},
{q:"LoRA在AI绘画中是什么？",o:["生成特定风格的小模型","提高图片分辨率","加速训练"],a:0,e:"LoRA在AI绘画中是一种轻量级的风格插件或角色插件。它通过微调少量参数，就能让模型学会特定的艺术风格。"},
{q:"Negative Prompt的作用是什么？",o:["用户不满意的图","告诉AI不要生成什么","删除提示词"],a:1,e:"Negative Prompt告诉AI在生成图片时要避免什么。比如输入\"low quality, bad anatomy\"可以让AI避免生成低质量的图片。"},
{q:"Seed在AI生图中起什么作用？",o:["植物种子","决定随机性的数值","图片编号"],a:1,e:"Seed是一个决定随机性的数字。相同的提示词+相同的Seed会生成完全相同的图片，修改Seed就会产生不同结果。"},
{q:"img2img功能是什么？",o:["图片转文字","用一张图片生成另一张图片","修复图片"],a:1,e:"img2img是Stable Diffusion的核心功能：上传一张图片，AI会在此基础上重新生成。可以调整重绘幅度来控制变化程度。"},
{q:"AI视频生成主要用什么技术？",o:["纯Transformer","扩散模型+时序处理","GAN"],a:1,e:"主流AI视频生成使用扩散模型+时序处理的技术。先用扩散模型生成单帧图片，再用时序模型把帧与帧之间平滑过渡。"},
{q:"OpenAI Sora的核心特点是什么？",o:["纯扩散模型","Transformer+扩散+世界模型","GAN"],a:1,e:"Sora的核心创新是引入了世界模型概念——它理解了物理世界的基本规律（物体运动、光影变化等），能生成更真实的高质量视频。"},
{q:"AI在设计领域有哪些应用？",o:["完全替代设计师","生成素材、激发灵感、加速工作流","打印输出"],a:1,e:"AI在设计领域的核心价值是提升效率。具体应用包括：生成设计素材和灵感图、自动生成UI初稿、批量生成营销配图、AI抠图和修图等。"},
{q:"什么是虚拟试穿技术？",o:["只能试鞋","AI让用户虚拟试穿衣服","试玩"],a:1,e:"虚拟试穿AI能让用户在线上穿上想买的衣服。技术原理是：提取衣服的平铺图和用户照片，用AI生成用户穿着的效果图。"},
{q:"什么是智能配音/TTS技术？",o:["真人配音","AI自动将文字转成语音","录音"],a:1,e:"TTS是文字转语音技术。现在的AI TTS已经非常逼真，能够模拟人的音色、语调、情感。ElevenLabs等工具还能克隆声音。"},
{q:"ElevenLabs能做什么？",o:["文字生成","AI语音合成，接近真人的声音","语音识别转文字"],a:1,e:"ElevenLabs是领先的AI语音合成平台，核心技术是生成极其逼真的人类语音。更强大的是声音克隆功能：只需上传几十秒语音样本就能制造出该人的AI声音。"},
{q:"AI Agent和ChatBot有什么区别？",o:["没有区别","Agent能自主干活","完全一样"],a:1,e:"AI Agent与普通聊天机器人的核心区别是：Agent不只是回答问题，还能自主完成行动。Agent可以理解目标、拆解任务、调用工具、执行操作。"},
{q:"AI Agent能做什么？",o:["只能做简单问答","能自主规划并调用工具完成任务","只能聊天"],a:0,e:"AI Agent能理解复杂目标并完成多步骤任务。比如让它\"帮我整理本周的AI新闻\"，它会自主搜索、筛选、分类、生成摘要。"},
{q:"Agent的Tools是什么？",o:["实体工具箱","Agent能调用的外部能力","聊天界面"],a:1,e:"Tools是Agent的手，让它能操作外部世界。常见的包括：网页搜索、API调用（查天气、订票）、文件操作、发送消息等。"},
{q:"推理优化主要包含哪些技术？",o:["训练阶段优化","让AI推理更快、更省资源","模型压缩"],a:0,e:"推理优化技术包括：量化（把参数从32位降到8位）、剪枝（去掉不重要的神经元）、蒸馏（小模型学习大模型）等。"},
{q:"模型量化是什么？",o:["数量化","把参数转成低精度表示","增大模型体积"],a:0,e:"模型量化是把模型参数从高精度转成低精度的技术。这能大幅减少模型体积和内存占用，同时加快推理速度。"},
{q:"RAG系统主要由哪些组件构成？",o:["单一AI模型","向量数据库+检索+生成","搜索引擎"],a:1,e:"完整RAG系统包括：1)向量数据库（存储知识库的向量）；2)检索模块（根据问题找到相关资料）；3)生成模块。"},
{q:"多模态AI是什么意思？",o:["只能处理文字","能同时处理文字、图像、声音、视频","单一功能"],a:1,e:"多模态AI能同时理解和处理多种形式的信息。可以看图说话、听音辨意、视频理解等。"},
{q:"思维链是什么？",o:["让AI空想","让AI展示推理过程再给答案","快速给出答案"],a:1,e:"思维链（CoT）是一种让AI思考的技术。是在回答前先让AI展示推理步骤，能显著提升复杂问题的准确率。"},
{q:"什么是灾难性遗忘？",o:["硬盘满了","新训练覆盖旧知识","电脑死机"],a:1,e:"灾难性遗忘是AI在学习了新知识后，之前的知识被覆盖或丢失的现象。这和人类不一样，人学新东西通常不会忘记旧的。"},
{q:"什么是涌现能力？",o:["突然消失","规模超过临界点后出现小模型没有的能力","逐渐学习"],a:0,e:"涌现是指当模型规模超过某个临界点后，突然展现出在小模型上不存在的能力。比如小模型做不了数学题，大到一定程度突然会了。"},
{q:"GPT-4和GPT-3.5的主要区别是什么？",o:["更便宜","参数更多、能力更强、有多模态","体积更小"],a:1,e:"GPT-4相比3.5主要提升：参数规模更大、推理能力显著增强、能处理图像输入、幻觉更少、指令遵循更准确。"},
{q:"为什么要做AI对齐？",o:["对齐数据格式","让AI输出符合人类价值观","训练模型"],a:1,e:"AI对齐是确保AI的目标与人类目标一致，让AI产出有用、无害、诚实的回答。如果没有对齐，AI可能给出有害内容或偏离意图。"},
{q:"RLHF是什么技术？",o:["随机猜测","人类反馈强化学习","纯监督学习"],a:1,e:"RLHF = Reinforcement Learning from Human Feedback。过程是：让AI生成多个回答，人类标注哪个更好，用这些标注来指导AI训练。"},
{q:"AI API是怎么计费的？",o:["按次数","按处理的总Token数计费","免费"],a:1,e:"AI API通常按Token计费。输入的文字转成Token，输出的文字也转成Token，两者加起来就是消耗量。"},
{q:"AI为什么需要GPU？",o:["always需要","训练和推理需要大量并行计算","不需要"],a:1,e:"GPU的并行计算能力极其适合AI。AI的核心运算是矩阵乘法，GPU有数千个小型计算单元，可以同时处理大量计算。"},
{q:"Streaming响应是什么？",o:["一次性返回","AI逐步返回结果","固定不变"],a:1,e:"Streaming是让AI边想边说的技术。AI生成一点就返回一点，用户能实时看到AI打字的过程，改善了用户体验。"},
{q:"如何减少AI幻觉？",o:["无法解决","提供充分背景信息、使用RAG","不管它"],a:1,e:"减少AI幻觉的方法：1)提供充分的背景信息；2)使用RAG技术；3)要求AI给出信息来源；4)多重验证。对于需要准确性的场景，RAG最有效。"},
{q:"向量数据库是做什么的？",o:["存储图片","存储向量并做相似度搜索","关系型数据库"],a:1,e:"向量数据库专门存储AI生成的embedding向量，并支持高速的相似度搜索。比如搜索\"手机\"，它能找到语义相关的\"电话\"等。"},
{q:"什么是Fine-tuning？",o:["粗略调整","用少量数据训练模型的特定能力","从零训练"],a:1,e:"Fine-tuning是在预训练模型基础上，用特定领域的数据进行进一步训练，让模型擅长某个特定任务。"},
{q:"Zero-shot是什么？",o:["给很多例子","不给例子直接让AI分类测试","多样本学习"],a:1,e:"Zero-shot是指不给任何例子，直接让AI完成分类等任务。这测试的是AI的泛化能力——即使没有专门训练过，也能凭常识完成任务。"},
{q:"Embedding的主要用途是什么？",o:["压缩存储","让AI理解语义相似性","可视化"],a:1,e:"Embedding的核心用途是让AI理解语义相似性。把文字转成向量后，意思相近的词向量距离近，这是NLP的基石技术。"},
{q:"AI Agent可以使用哪些工具？",o:["只能对话","调用API、搜索、发邮件等","只能回答问题"],a:1,e:"AI Agent可以调用各种外部工具：搜索引擎、API（查天气、股票）、文档处理、发送消息、执行代码等。"},
{q:"Context length是什么意思？",o:["回答的长度","单次对话能处理的最大Token数","答案限制"],a:1,e:"上下文长度是AI一次能处理的最大Token数，决定了单次对话能记住多少内容。超过这个限制，早期内容会被遗忘。"},
{q:"Temperature参数应该怎么设置？",o:["创意高精确低","创意任务用高值，精确任务用低值","不影响"],a:1,e:"Temperature设置：创意写作用0.7-0.9，精确任务用0-0.3，一般对话用0.5-0.7。高值=高风险高回报，低值=稳定保守。"},
{q:"AI生成内容的版权归属谁？",o:["归属AI公司","归属使用者，但法律尚不完善","公有领域"],a:1,e:"目前AI生成内容的版权归属尚有争议，但主流观点是：AI生成内容版权归属于使用者。法律还在完善中。"},
{q:"什么是vibe design？",o:["传统品牌设计","AI辅助下凭感觉做设计，关注整体氛围","视觉软件"],a:1,e:"vibe design是AI时代的设计新范式。设计师不再用像素级调整细节，而是通过调整提示词来调教AI产出符合感觉的作品。"},

var STORAGE_KEY='ai-quiz-progress';
function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{correct:[],wrong:[]}}catch(e){return{correct:[],wrong:[]}}}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}
function getQuestionsPool(){
var p=getProgress(),pool=[];
Q.forEach(function(q,i){if(p.wrong.includes(i)){pool.push({q:q,i:i,prio:0})}else if(!p.correct.includes(i)){pool.push({q:q,i:i,prio:1})}});
pool.sort(function(a,b){if(a.prio!==b.prio)return a.prio-b.prio;return Math.random()-0.5});
return pool.slice(0,5).map(function(x){return x.q})}
function updateStats(){var p=getProgress();document.getElementById('correctCount').textContent=p.correct.length;document.getElementById('wrongCount').textContent=p.wrong.length;document.getElementById('progress').textContent=p.correct.length+'/'+Q.length}
var quizData=[],answers={};
var params=new URLSearchParams(window.location.search),data=params.get("data");
if(data)try{quizData=JSON.parse(decodeURIComponent(data))}catch(e){}
if(!quizData.length)quizData=getQuestionsPool();
function renderQuiz(){document.getElementById("quiz").innerHTML=quizData.map(function(e,t){return'<div class="question"><div class="question-title">'+(t+1)+". "+e.q+'</div><div class="options">'+e.o.map(function(e,n){return'<div class="option" onclick="selectOption('+t+","+n+')" data-q="'+t+'" data-o="'+n+'"><div class="option-letter">'+'ABCD'[n]+'</div><div class="option-text">'+e+"</div></div>"}).join("")+"</div></div>"}).join("")}
function selectOption(e,t){document.querySelectorAll('[data-q="'+e+'"]').forEach(function(e){e.classList.remove("selected")});document.querySelector('[data-q="'+e+'"][data-o="'+t+'"]').classList.add("selected");answers[e]=t}
function submitQuiz(){var p=getProgress(),correct=0;quizData.forEach(function(t,n){var r=t.a;document.querySelectorAll('[data-q="'+n+'"]').forEach(function(e,o){e.classList.remove("correct","wrong");o===r&&e.classList.add("correct");answers[n]===o&&o!==r&&e.classList.add("wrong")});if(answers[n]===r){correct++;var qi=Q.indexOf(t);if(!p.correct.includes(qi)&&!p.wrong.includes(qi))p.correct.push(qi);if(p.wrong.includes(qi)){p.wrong=p.wrong.filter(function(x){return x!==qi});p.correct.push(qi)}}else{var qi=Q.indexOf(t);if(!p.correct.includes(qi)&&!p.wrong.includes(qi))p.wrong.push(qi)}saveProgress(p);var o=document.querySelectorAll(".question")[n],i=o.querySelector(".exp");if(!i&&t.e){i=document.createElement("div");i.className="exp";i.innerHTML='<div class="exp-title">💡 答案解析</div>'+t.e;o.appendChild(i)}});document.getElementById("result").style.display="block";document.getElementById("score").textContent=correct+"/5";updateStats()}
document.getElementById("date").textContent=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric"});updateStats();renderQuiz();
</script>
