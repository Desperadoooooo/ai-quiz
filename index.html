<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI知识训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:30px}
.header h1{font-size:28px;margin-bottom:10px}
.question{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.question-title{font-size:16px;font-weight:600;color:#333;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;padding:12px;background:#f5f5f5;border-radius:10px;cursor:pointer;border:2px solid transparent}
.option.selected{background:#e8f4ff;border-color:#667eea}
.option.correct{background:#d4edda;border-color:#28a745}
.option.wrong{background:#f8d7da;border-color:#dc3545}
.option-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#667eea;color:white;border-radius:50%;font-weight:600;margin-right:12px}
.submit-btn{width:100%;padding:16px;background:#667eea;color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:20px}
.result{background:white;border-radius:16px;padding:30px;text-align:center;margin-top:20px}
.score{font-size:48px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.exp{background:#f8f9fa;border-radius:12px;padding:16px;margin-top:12px;font-size:14px;color:#666;border-left:3px solid #667eea}
.exp-title{font-weight:600;color:#333;margin-bottom:6px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🧠 每日AI知识训练</h1></div>
<div id="quiz"></div>
<button class="submit-btn" onclick="submitQuiz()">提交答案</button>
<div class="result" id="result" style="display:none"><div class="score" id="score">0/5</div></div>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const data=params.get('data');
let quizData=[],answers={};
if(data)try{quizData=JSON.parse(decodeURIComponent(data))}catch(e){}
if(!quizData.length)quizData=[
{q:"扩散模型核心原理？",o:["逐步添加噪声然后逆向去噪","编码器-解码器","Transformer","对抗训练"],a:0,e:"AI生成图像的核心原理，像把画逐渐涂黑再反过来逐步画清楚"},
{q:"Midjourney --stylize 控制？",o:["种子值","风格化程度","图文权重","随机性"],a:1,e:"决定AI生成图像风格偏艺术还是写实，数值越高越抽象"},
{q:"CLIP核心功能？",o:["图像生成","文本到图像跨模态","视频生成","语音识别"],a:1,e:"让AI能看懂文字和图片的对应关系，是文生图的基础"},
{q:"LoRA用途？",o:["加速训练","大模型微调降显存","超分辨率","翻译"],a:1,e:"高效微调技术，用很少显存训练AI模型定制风格"},
{q:"Prompt Engineering是？",o:["写代码","优化AI对话指令","UI设计","数据标注"],a:1,e:"跟AI对话的'说话技巧'，同样问题问得好不好结果差很多"}
];
function renderQuiz(){document.getElementById('quiz').innerHTML=quizData.map((q,i)=>`<div class="question"><div class="question-title">${i+1}. ${q.q}</div><div class="options">${q.o.map((o,j)=>`<div class="option" onclick="selectOption(${i},${j})" data-q="${i}" data-o="${j}"><div class="option-letter">${'ABCD'[j]}</div><div>${o}</div></div>`).join('')}</div></div>`).join('')}
function selectOption(q,o){document.querySelectorAll(`[data-q="${q}"]`).forEach(e=>e.classList.remove('selected'));document.querySelector(`[data-q="${q}"][data-o="${o}"]`).classList.add('selected');answers[q]=o}
function submitQuiz(){let correct=0;quizData.forEach((q,i)=>{let a=q.a;document.querySelectorAll(`[data-q="${i}"]`).forEach((e,j)=>{e.classList.remove('correct','wrong');if(j===a)e.classList.add('correct');if(answers[i]===j&&j!==a)e.classList.add('wrong')});if(answers[i]===a)correct++;let qEl=document.querySelectorAll('.question')[i];let exp=qEl.querySelector('.exp');if(!exp&&q.e){exp=document.createElement('div');exp.className='exp';exp.innerHTML=`<div class="exp-title">💡 解析</div>${q.e}`;qEl.appendChild(exp)}});document.getElementById('result').style.display='block';document.getElementById('score').textContent=correct+'/5'}
renderQuiz();
</script>
</body>
</html>
