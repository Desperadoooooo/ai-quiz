<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI知识训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:30px}
.header h1{font-size:28px;margin-bottom:10px}
.question{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.question-title{font-size:16px;font-weight:600;color:#333;margin-bottom:16px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;padding:12px;background:#f5f5f5;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.option:hover{background:#eee}
.option.selected{background:#e8f4ff;border-color:#667eea}
.option.correct{background:#d4edda;border-color:#28a745}
.option.wrong{background:#f8d7da;border-color:#dc3545}
.option-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#667eea;color:white;border-radius:50%;font-weight:600;margin-right:12px;flex-shrink:0}
.option-text{flex:1;word-break:break-word}
.submit-btn{width:100%;padding:16px;background:#667eea;color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:20px;transition:background 0.2s}
.submit-btn:hover{background:#5568d3}
.result{background:white;border-radius:16px;padding:30px;text-align:center;margin-top:20px}
.score{font-size:48px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.exp{background:#f8f9fa;border-radius:12px;padding:16px;margin-top:12px;font-size:14px;color:#555;line-height:1.6;border-left:4px solid #667eea}
.exp-title{font-weight:600;color:#333;margin-bottom:8px;font-size:15px}
.date{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:8px 20px;border-radius:20px;font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🧠 每日AI知识训练</h1></div>
<div id="quiz"></div>
<button class="submit-btn" onclick="submitQuiz()">提交答案</button>
<div class="result" id="result" style="display:none"><div class="score" id="score">0/5</div></div>
</div>
<div class="date" id="date"></div>
<script>
const params=new URLSearchParams(window.location.search);
const data=params.get('data');
let quizData=[],answers={};
if(data)try{quizData=JSON.parse(decodeURIComponent(data))}catch(e){}
if(!quizData.length)quizData=[
{q:"扩散模型核心原理？",o:["逐步添加噪声然后逆向去噪","编码器-解码器","Transformer","对抗训练"],a:0,e:"扩散模型是当前AI图像生成的主流技术。它通过两个过程工作：前向过程逐步给图片加噪直到变成纯噪声，逆向过程学习从噪声恢复图像。简单理解就像从一个模糊的意象逐渐'洗'出清晰的图像。Midjourney、Stable Diffusion都基于此技术。"},
{q:"Midjourney --stylize 控制？",o:["种子值","风格化程度","图文权重","随机性"],a:1,e:"--stylize（或--s）控制图像的风格化程度。数值越低（默认100），图像越接近描述词的精确表达；数值越高，AI越倾向于艺术化、抽象化的创作。这个参数帮助设计师在'写实还原'和'艺术创作'之间找到平衡。"},
{q:"CLIP核心功能？",o:["图像生成","文本到图像跨模态","视频生成","语音识别"],a:1,e:"CLIP是OpenAI开发的革命性模型，核心能力是理解'图片和文字的关系'。它能从大量图文对中学习，建立视觉概念和语言描述的桥梁。正是因为CLIP，文生图模型才能'看懂'用户的提示词。"},
{q:"LoRA用途？",o:["加速训练","大模型微调降显存","超分辨率","翻译"],a:1,e:"LoRA是一种轻量化的模型微调技术。它的原理是在大模型旁边'挂'一个小型适配器，用少量数据就能让AI学会特定风格（比如你的个人画风），而无需重新训练整个大模型。训练成本从数万GPU小时降到数十小时。"},
{q:"Prompt Engineering是？",o:["写代码","优化AI对话指令","UI设计","数据标注"],a:1,e:"提示词工程简单说就是'和AI对话的技巧'。���样一个问题，不同问法会有截然不同的结果。好的提示词通常包含：主体描述、风格设定、构图指令、参数调节等。设计师掌握这项技能能大幅提升AI工具产出质量。"}
];
function renderQuiz(){document.getElementById('quiz').innerHTML=quizData.map((q,i)=>`<div class="question"><div class="question-title">${i+1}. ${q.q}</div><div class="options">${q.o.map((o,j)=>`<div class="option" onclick="selectOption(${i},${j})" data-q="${i}" data-o="${j}"><div class="option-letter">${'ABCD'[j]}</div><div class="option-text">${o}</div></div>`).join('')}</div></div>`).join('')}
function selectOption(q,o){document.querySelectorAll(`[data-q="${q}"]`).forEach(e=>e.classList.remove('selected'));document.querySelector(`[data-q="${q}"][data-o="${o}"]`).classList.add('selected');answers[q]=o}
function submitQuiz(){let correct=0;quizData.forEach((q,i)=>{let a=q.a;document.querySelectorAll(`[data-q="${i}"]`).forEach((e,j)=>{e.classList.remove('correct','wrong');if(j===a)e.classList.add('correct');if(answers[i]===j&&j!==a)e.classList.add('wrong')});if(answers[i]===a)correct++;let qEl=document.querySelectorAll('.question')[i];let exp=qEl.querySelector('.exp');if(!exp&&q.e){exp=document.createElement('div');exp.className='exp';exp.innerHTML=`<div class="exp-title">💡 答案解析</div>${q.e}`;qEl.appendChild(exp)}});document.getElementById('result').style.display='block';document.getElementById('score').textContent=correct+'/5';document.getElementById('result').scrollIntoView({behavior:'smooth'})}
document.getElementById('date').textContent=new Date
