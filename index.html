<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI知识训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:30px}
.header h1{font-size:28px;margin-bottom:10px}
.info{font-size:14px;opacity:0.9}
.stats{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:14px}
.stats span{background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:12px}
.reset-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;margin-top:10px}
.reset-btn:hover{background:rgba(255,255,255,0.3)}
.question{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.question-title{font-size:16px;font-weight:600;color:#333;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;padding:12px;background:#f5f5f5;border-radius:10px;cursor:pointer;border:2px solid transparent}
.option:hover{background:#eee}
.option.selected{background:#e8f4ff;border-color:#667eea}
.option.correct{background:#d4edda;border-color:#28a745}
.option.wrong{background:#f8d7da;border-color:#dc3545}
.option-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#667eea;color:white;border-radius:50%;font-weight:600;margin-right:12px}
.option-text{flex:1;word-break:break-word}
.submit-btn{width:100%;padding:16px;background:#667eea;color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:20px}
.result{background:white;border-radius:16px;padding:30px;text-align:center;margin-top:20px}
.score{font-size:48px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.exp{background:#f8f9fa;border-radius:12px;padding:16px;margin-top:12px;font-size:14px;color:#555;line-height:1.6;border-left:4px solid #667eea}
.exp-title{font-weight:600;color:#333;margin-bottom:8px}
.date{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:8px 20px;border-radius:20px;font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🧠 每日AI知识训练</h1>
<div class="info" id="info">题库:100题</div>
<div class="stats">
<span>✅ 正确: <b id="correctCount">0</b></span>
<span>❌ 错误: <b id="wrongCount">0</b></span>
<span>📚 进度: <b id="progress">0/100</b></span>
</div>
<button class="reset-btn" onclick="resetProgress()">🔄 重置学习进度</button>
</div>
<div id="quiz"></div>
<button class="submit-btn" onclick="submitQuiz()">提交答案</button>
<div class="result" id="result" style="display:none"><div class="score" id="score">0/5</div></div>
</div>
<div class="date" id="date"></div>
<script>
var Q=[{q:"LLM核心原理？",o:["逐字预测token","图像识别","语音合成"],a:0,e:"LLM通过海量文本训练学习预测下一个词的概率"},{q:"Prompt Engineering？",o:["写代码","优化AI对话指令","设计UI"],a:1,e:"提示词工程是和AI对话的技巧"},{q:"Cursor核心能力？",o:["直接写完项目","自然语言生成代码","代替敲键盘"],a:1,e:"AI编程工具能读懂自然语言生成代码"},{q:"vibe coding？",o:["用代码写音乐","AI辅助看感觉而非写代码","可视化编程"],a:1,e:"vibe coding是氛围编程让AI写代码"},{q:"上下文窗口指？",o:["能记住多少对话","电脑内存大小","代码行数限制"],a:0,e:"上下文窗口是AI一次能记住的内容量"},{q:"RAG是？",o:["生成对抗网络","检索增强生成","自动回归模型"],a:1,e:"RAG是检索增强生成"},{q:"AI幻觉？",o:["它太困了","AI在编造答案","网络断了"],a:1,e:"AI自信满满说错误信息"},{q:"AI Agent？",o:["聊天机器人","能自主规划执行任务的AI系统","编程语言"],a:1,e:"AI Agent能理解目标→执行→检查→修正"},{q:"Token是？",o:["代币","LLM处理文本的基本单位","编程语言"],a:1,e:"Token是AI处理文字的最小单位"},{q:"Few-shot learning？",o:["只学几次就会","大量数据训练","快速学习算法"],a:0,e:"Few-shot是给AI看1-3个例子就能理解"},{q:"LoRA优势？",o:["训练快","用少量显存微调大模型","生成图片"],a:1,e:"LoRA用少量显存微调大模型"},{q:"temperature参数？",o:["计算速度","回答随机性程度","模型大小"],a:1,e:"Temperature控制AI输出随机性"},{q:"Embedding？",o:["插画","把文字转向量","图片处理"],a:1,e:"Embedding把文��转成向量"},{q:"Copilot原理？",o:["自己写代码","预测补全代码","翻译代码"],a:1,e:"Copilot是超级自动补全"},{q:"MCP是？",o:["AI模型","让AI和工具连接的标准","编译器"],a:1,e:"MCP是AI和工具连接的桥梁"},{q:"System Prompt？",o:["操作系统","给AI设定身份的隐藏指令","用户输入"],a:1,e:"System Prompt设定AI的身份规则"},{q:"Function Calling？",o:["打电话","让AI调用外部工具","写函数"],a:1,e:"Function Calling让AI能调用API"},{q:"SD原理？",o:["Transformer","扩散模型","GAN"],a:1,e:"SD用扩散模型生成图片"},{q:"ControlNet？",o:["网络控制","控制AI生图的骨骼/边缘","游戏引擎"],a:1,e:"ControlNet控制AI生图"},{q:"Lora在AI绘画？",o:["生成特定风格小模型","提高分辨率","加速训练"],a:0,e:"Lora是AI绘画的风格插件"},{q:"负面提示词？",o:["不满意的图","告诉AI不要生成什么","删除提示词"],a:1,e:"Negative Prompt告诉AI避免什么"},{q:"种子值？",o:["植物种子","决定随机性的数值","图片编号"],a:1,e:"Seed是AI生图的随机种子"},{q:"img2img？",o:["图片转文字","用一张图生成另一张图","图片修复"],a:1,e:"图生图是SD核心功能"},{q:"AI视频生成技术？",o:["Transformer","扩散模型+时序","GAN"],a:1,e:"视频生成用扩散模型加时序"},{q:"Sora特点？",o:["纯扩散","Transformer+扩散+世界模型","GAN"],a:1,e:"Sora理解物理世界"},{q:"AI在设计应用？",o:["替代设计","生成素材加速工作流","打印"],a:1,e:"AI做灵感激发、草图生成"},{q:"虚拟试穿？",o:["试鞋","AI让用户虚拟试穿","试玩"],a:1,e:"虚拟试穿让用户看效果"},{q:"智能配音？",o:["真人配音","AI自动配音","录音"],a:1,e:"智能配音用TTS技术"},{q:"ElevenLabs能力？",o:["文字生成","AI语音合成模仿人声","语音识别"],a:1,e:"ElevenLabs能克隆声音"},{q:"Agent vs ChatBot？",o:["没区别","Agent能自主干活Bot只能对话","一样"],a:1,e:"Agent能做实事不只是对话"},{q:"AI Agent能？",o:["单个任务","能自主规划调用工具完成任务","简单对话"],a:0,e:"AI Agent能理解目标→执行→检查"},{q:"Agent的Tools？",o:["工具箱","Agent能调用外部能力","聊天界面"],a:1,e:"Tools是Agent的手"}];
var STORAGE_KEY='ai-quiz-progress';
function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{correct:[],wrong:[]}}catch(e){return{correct:[],wrong:[]}}}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}
function getQuestionsPool(){
var p=getProgress(),pool=[];
Q.forEach(function(q,i){if(p.wrong.includes(i)){pool.push({q:q,i:i,prio:0})}else if(!p.correct.includes(i)){pool.push({q:q,i:i,prio:1})}});
pool.sort(function(a,b){if(a.prio!==b.prio)return a.prio-b.prio;return Math.random()-0.5});
return pool.slice(0,5).map(function(x){return x.q})}
function updateStats(){var p=getProgress();document.getElementById('correctCount').textContent=p.correct.length;document.getElementById('wrongCount').textContent=p.wrong.length;document.getElementById('progress').textContent=p.correct.length+'/'+Q.length}
function resetProgress(){if(confirm('确定要重置所有学习进度吗？')){localStorage.removeItem(STORAGE_KEY);location.reload()}}
var quizData=[],answers={};
var params=new URLSearchParams(window.location.search),data=params.get("data");
if(data)try{quizData=JSON.parse(decodeURIComponent(data))}catch(e){}
if(!quizData.length)quizData=getQuestionsPool();
function renderQuiz(){document.getElementById("quiz").innerHTML=quizData.map(function(e,t){return'<div class="question"><div class="question-title">'+(t+1)+". "+e.q+'</div><div class="options">'+e.o.map(function(e,n){return'<div class="option" onclick="selectOption('+t+","+n+')" data-q="'+t+'" data-o="'+n+'"><div class="option-letter">'+'ABCD'[n]+'</div><div class="option-text">'+e+"</div></div>"}).join("")+"</div></div>"}).join("")}
function selectOption(e,t){document.querySelectorAll('[data-q="'+e+'"]').forEach(function(e){e.classList.remove("selected")});document.querySelector('[data-q="'+e+'"][data-o="'+t+'"]').classList.add("selected");answers[e]=t}
function submitQuiz(){var p=getProgress(),correct=0;quizData.forEach(function(t,n){var r=t.a;document.querySelectorAll('[data-q="'+n+'"]').forEach(function(e,o){e.classList.remove("correct","wrong");o===r&&e.classList.add("correct");answers[n]===o&&o!==r&&e.classList.add("wrong")});if(answers[n]===r){correct++;var qi=Q.indexOf(t);if(!p.correct.includes(qi)&&!p.wrong.includes(qi))p.correct.push(qi);if(p.wrong.includes(qi)){p.wrong=p.wrong.filter(function(x){return x!==qi});p.correct.push(qi)}}else{var qi=Q.indexOf(t);if(!p.correct.includes(qi)&&!p.wrong.includes(qi))p.wrong.push(qi)}saveProgress(p);var o=document.querySelectorAll(".question")[n],i=o.querySelector(".exp");if(!i&&t.e){i=document.createElement("div");i.className="exp";i.innerHTML='<div class="exp-title">💡答案解析</div>'+t.e;o.appendChild(i)}});document.getElementById("result").style.display="block";document.getElementById("score").textContent=correct+"/5";updateStats()}
document.getElementById("date").textContent=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric"});updateStats();renderQuiz();
</script>
</body>
</html>
